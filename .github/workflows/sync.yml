name: Sync Notion Content

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

# Prevent concurrent runs to avoid race conditions
concurrency:
  group: notion-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    # Skip in the notion-press template repo itself; runs normally in
    # repos created from the template (you can delete this line)
    if: github.repository != 'ktrann24/notion-press'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch content from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run fetch

      - name: Commit and push changes
        run: |
          if [[ -n $(git status --porcelain content/ public/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/ public/
            git commit -m "Sync content from Notion - $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
